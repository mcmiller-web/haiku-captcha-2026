<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet" href="styles.css">

</head>
<body id="haiku-end">

    <div id="floating-poems-root" class="floating-poems-root" aria-hidden="true"></div>

    <main class="end-container">
        <h1 class="page-titles" id="end-title">Only humans do pointless things.</h1>

        <!--HAIKU RESTART BUTTON-->
        <a href="index.html">
            <img src="img/restart-button.png" alt="Restart the haiku process" width="200px">
        </a>
    </main>

    <script>
        (function () {
            const STORAGE_KEY = 'haikuSubmissions';
            const MAX_VISIBLE = 6;
            const ROTATE_MS = 22000;

            function loadPoems() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return [];
                    const data = JSON.parse(raw);
                    if (!Array.isArray(data)) return [];
                    return data
                        .map((item) => (typeof item === 'string' ? { text: item } : item))
                        .filter((item) => item && typeof item.text === 'string' && item.text.trim());
                } catch {
                    return [];
                }
            }

            function shuffle(arr) {
                const a = arr.slice();
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function pickSix(poems) {
                if (poems.length <= MAX_VISIBLE) return poems.map((p) => p.text.trim());
                return shuffle(poems)
                    .slice(0, MAX_VISIBLE)
                    .map((p) => p.text.trim());
            }

            function renderFloating(root, texts) {
                root.innerHTML = '';
                texts.forEach((text, i) => {
                    const el = document.createElement('div');
                    el.className = 'floating-poem';
                    el.textContent = text;

                    const left = 5 + ((i * 17 + Math.random() * 12) % 78);
                    const top = 8 + ((i * 23 + Math.random() * 15) % 72);
                    el.style.left = left + '%';
                    el.style.top = top + '%';

                    const duration = 16 + Math.random() * 14;
                    const delay = -Math.random() * duration;
                    el.style.animationDuration = duration + 's';
                    el.style.animationDelay = delay + 's';

                    const opacity = 0.28 + Math.random() * 0.22;
                    el.style.opacity = String(opacity);

                    root.appendChild(el);
                });
            }

            const root = document.getElementById('floating-poems-root');
            let pool = loadPoems();

            function tick() {
                pool = loadPoems();
                const texts = pickSix(pool);
                renderFloating(root, texts);
            }

            tick();
            if (pool.length > MAX_VISIBLE) {
                setInterval(tick, ROTATE_MS);
            }
        })();
    </script>
</body>
</html>
